name: Keep Alive (Vercel Cold Start Prevention)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" "${{ secrets.VERCEL_URL }}/api/health" || true
